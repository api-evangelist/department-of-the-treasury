naftiko: 1.0.0-alpha2
info:
  label: Treasury Fiscal Data API — Spending
  description: 'Treasury Fiscal Data API — Spending. 1 operations. Lead operation: U.S. Treasury Monthly Statement of the
    Public Debt (MSPD). Self-contained Naftiko capability covering one Department Of The Treasury business surface.'
  tags:
  - Department Of The Treasury
  - Spending
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DEPARTMENT_OF_THE_TREASURY_API_KEY: DEPARTMENT_OF_THE_TREASURY_API_KEY
capability:
  consumes:
  - type: http
    namespace: fiscal-data-spending
    baseUri: https://api.fiscaldata.treasury.gov/services/api/fiscal_service
    description: Treasury Fiscal Data API — Spending business capability. Self-contained, no shared references.
    resources:
    - name: v1-accounting-od-utf
      path: /v1/accounting/od/utf
      operations:
      - name: getmspd
        method: GET
        description: U.S. Treasury Monthly Statement of the Public Debt (MSPD)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: fiscal-data-spending-rest
    port: 8080
    description: REST adapter for Treasury Fiscal Data API — Spending. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/accounting/od/utf
      name: v1-accounting-od-utf
      description: REST surface for v1-accounting-od-utf.
      operations:
      - method: GET
        name: getmspd
        description: U.S. Treasury Monthly Statement of the Public Debt (MSPD)
        call: fiscal-data-spending.getmspd
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: fiscal-data-spending-mcp
    port: 9090
    transport: http
    description: MCP adapter for Treasury Fiscal Data API — Spending. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: u-s-treasury-monthly-statement-public
      description: U.S. Treasury Monthly Statement of the Public Debt (MSPD)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fiscal-data-spending.getmspd
      outputParameters:
      - type: object
        mapping: $.
