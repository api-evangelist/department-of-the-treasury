naftiko: 1.0.0-alpha2
info:
  label: Treasury Fiscal Data API — Auctions
  description: 'Treasury Fiscal Data API — Auctions. 1 operations. Lead operation: Securities Auctions and Sales. Self-contained
    Naftiko capability covering one Department Of The Treasury business surface.'
  tags:
  - Department Of The Treasury
  - Auctions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DEPARTMENT_OF_THE_TREASURY_API_KEY: DEPARTMENT_OF_THE_TREASURY_API_KEY
capability:
  consumes:
  - type: http
    namespace: fiscal-data-auctions
    baseUri: https://api.fiscaldata.treasury.gov/services/api/fiscal_service
    description: Treasury Fiscal Data API — Auctions business capability. Self-contained, no shared references.
    resources:
    - name: v2-accounting-od-securities_sales
      path: /v2/accounting/od/securities_sales
      operations:
      - name: getsecuritiessales
        method: GET
        description: Securities Auctions and Sales
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: fiscal-data-auctions-rest
    port: 8080
    description: REST adapter for Treasury Fiscal Data API — Auctions. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v2/accounting/od/securities-sales
      name: v2-accounting-od-securities-sales
      description: REST surface for v2-accounting-od-securities_sales.
      operations:
      - method: GET
        name: getsecuritiessales
        description: Securities Auctions and Sales
        call: fiscal-data-auctions.getsecuritiessales
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: fiscal-data-auctions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Treasury Fiscal Data API — Auctions. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: securities-auctions-and-sales
      description: Securities Auctions and Sales
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fiscal-data-auctions.getsecuritiessales
      outputParameters:
      - type: object
        mapping: $.
