specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Department of the Treasury
providerId: department-of-the-treasury
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Federal Government
  - Finance
  - Debt
  - Sanctions
  - Open Data
description: Department of the Treasury public APIs (Fiscal Data, OFAC Sanctions List Service, TreasuryDirect,
  SAM.gov, IRS public data) are free of charge and operated as public data services. The Fiscal Data
  API and SAM.gov Entity Management API are gated through api.data.gov developer keys (free, registration
  required); OFAC's Sanctions List Service is unauthenticated. There is no paid tier, no billing relationship,
  and no commercial contract for use of these APIs.
sources:
  - https://fiscaldata.treasury.gov/api-documentation/
  - https://sanctionslistservice.ofac.treas.gov/
  - https://open.gsa.gov/api/entity-api/
  - https://api.data.gov/
plans:
  - id: department-of-the-treasury-public-free
    name: Public Free
    type: freemium
    description: Free public access. Fiscal Data and SAM.gov Entity APIs use api.data.gov keys (default
      1,000 requests per hour); OFAC Sanctions List Service is unauthenticated; TreasuryDirect and IRS
      public datasets are open downloads with fair-use throttling.
    entries:
      - label: api.data.gov Keyed Requests
        description: Free, requires an api.data.gov key. Default 1,000 requests per hour per key; raise
          via api.data.gov support.
        name: keyed_requests
        type: quota
        metric: requests
        limit: 1000
        timeFrame: hour
        geo: US
        domains:
          - https://api.fiscaldata.treasury.gov/services/api/fiscal_service
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: OFAC SLS Requests
        description: Unauthenticated free access to the OFAC Sanctions List Service.
        name: ofac_requests
        type: quota
        metric: requests
        limit: -1
        timeFrame: month
        geo: US
        domains:
          - https://sanctionslistservice.ofac.treas.gov/api
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: TreasuryDirect / IRS Open Endpoints
        description: Free public datasets and feeds; fair-use throttling.
        name: open_requests
        type: quota
        metric: requests
        limit: -1
        timeFrame: month
        geo: US
        domains:
          - https://www.treasurydirect.gov/
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Public Documentation
      - name: Open Data License (public-domain federal data)
      - name: Treasury Fiscal Data API
      - name: OFAC Sanctions List Service API
      - name: TreasuryDirect Securities API
      - name: SAM.gov Entity Management API
      - name: IRS Public APIs
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
