specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Department of the Treasury
providerId: department-of-the-treasury
publisherName: U.S. Department of the Treasury
serviceCategory: Federal Government / Public Open Data
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Federal Government
  - Finance
  - Sanctions
  - Open Data
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps for Department of the Treasury public APIs: zero-cost public data services,
  funded through congressional appropriations rather than per-call billing. FinOps practice for consumers
  centers on operational cost (egress, caching, downstream storage, sanctions-screening compute) rather
  than provider invoice cost.'
sources:
  - https://fiscaldata.treasury.gov/api-documentation/
  - https://sanctionslistservice.ofac.treas.gov/
  - https://api.data.gov/
principles:
  - name: Visibility
    description: Track consumer-side request volume against api.data.gov developer-account dashboards
      for keyed APIs (Fiscal Data, SAM.gov); for OFAC SLS, monitor download cadence and digest verification
      via the consumer-side ingest pipeline.
  - name: Allocation
    description: Allocate consumer-side cost (egress, downstream storage, sanctions screening compute)
      to the consuming workload (compliance, treasury operations, research). There are no provider charges
      to allocate.
  - name: Optimization
    description: Cache Fiscal Data results at the consumer side, batch sanctions-list downloads to the
      OFAC publication cadence rather than polling, and ensure SAM.gov queries use targeted filters to
      avoid scanning the full entity dataset.
  - name: Accountability
    description: Compliance owns OFAC sanctions-list ingest, treasury operations owns Fiscal Data feeds,
      and procurement owns SAM.gov consumption; each team monitors its own consumer-side cost.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Benchmarking
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Workload Optimization
      - Rate Optimization
      - Architecting for Cloud
  - name: Manage the FinOps Practice
    capabilities:
      - FinOps Education and Enablement
      - Onboarding Workloads
billingModel:
  pricingCategory: Free / Public Data
  billingFrequency: N/A
  billingCurrency: USD
  chargeCategories:
    - Usage
  chargeFrequency: N/A
focusColumns:
  ServiceName: Treasury Public APIs
  ServiceCategory: Federal Government / Public Open Data
  ProviderName: U.S. Department of the Treasury
  PublisherName: U.S. Department of the Treasury
  InvoiceIssuerName: N/A (no invoice issued)
  PricingCategory: Free
  PricingUnit: request
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: api_requests
    description: Public API requests (consumer-side count)
    unit: request
    aggregation: sum
    dimensions:
      - api
      - endpoint
      - bureau
      - consumer
  - name: data_egress
    description: Bytes downloaded from Treasury endpoints (consumer-side metric)
    unit: GB
    aggregation: sum
    dimensions:
      - api
      - bureau
  - name: sanctions_screenings
    description: Number of records screened against the OFAC Sanctions List
    unit: record
    aggregation: sum
    dimensions:
      - consumer
apis:
  - name: Treasury Fiscal Data API
    baseURL: https://api.fiscaldata.treasury.gov/services/api/fiscal_service
    tags:
      - Finance
      - Debt
      - Open Data
    serviceName: Treasury Fiscal Data API
    serviceCategory: API
  - name: OFAC Sanctions List Service API
    baseURL: https://sanctionslistservice.ofac.treas.gov/api
    tags:
      - Sanctions
      - Compliance
    serviceName: OFAC Sanctions List Service API
    serviceCategory: API
  - name: TreasuryDirect Securities API
    baseURL: https://www.treasurydirect.gov/
    tags:
      - Securities
      - Auctions
    serviceName: TreasuryDirect Securities API
    serviceCategory: API
  - name: SAM.gov Entity Management API
    baseURL: https://api.sam.gov/entity-information/v3/entities
    tags:
      - Procurement
      - Awards
    serviceName: SAM.gov Entity Management API
    serviceCategory: API
  - name: IRS Public APIs
    baseURL: https://www.irs.gov/
    tags:
      - Tax
      - Charities
    serviceName: IRS Public APIs
    serviceCategory: API
unitEconomics:
  - name: Consumer Cost per 1K Requests
    metric: consumer_side_cost / (api_requests / 1000)
    target: trend down via caching
  - name: Cost per Sanctions Screening
    metric: screening_compute_cost / sanctions_screenings
    target: TBD
maintainers:
